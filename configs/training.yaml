model:
  type: "hybrid_gnn_transformer"
  hidden_dim: 256
  gat_heads: 4
  transformer_heads: 4
  transformer_layers: 2
  prediction_horizon: 10

training:
  epochs: 20
  batch_size: 64
  learning_rate: 1e-4
  lr: 1e-4
  weight_decay: 1e-5
  scheduler: "CosineAnnealingLR"
  loss: "SequenceMSE"
  discount_factor: 0.95
  patience: 15

ppo:
  learning_rate: 3e-4
  total_timesteps: 320
  clip_epsilon: 0.2
  entropy_coeff: 0.01
  value_loss_coeff: 0.5
  n_steps: 64
  batch_size: 64
  epochs: 2
  n_epochs: 2
  gamma: 0.99
  gae_lambda: 0.95
